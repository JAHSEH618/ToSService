services:
  tos-upload-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: tos-upload-service:latest
    container_name: tos-upload-service
    ports:
      - "${SERVICE_PORT:-10086}:10086"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://localhost:10086/api/v1/health/live" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - tos-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  tos-network:
    driver: bridge
